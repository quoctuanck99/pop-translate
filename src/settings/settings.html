<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pop Translate — Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1e1e2e;
      color: #e0e0e0;
      padding: 24px;
      font-size: 13px;
    }
    h1 { font-size: 16px; margin-bottom: 24px; color: #fff; }
    .field { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    input[type="password"], input[type="text"], select {
      width: 100%;
      background: #252540;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 8px 10px;
      font-size: 13px;
      outline: none;
    }
    input:focus, select:focus { border-color: #4a90d9; }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .toggle-label { font-size: 13px; color: #e0e0e0; }
    .toggle { position: relative; width: 36px; height: 20px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.2s;
    }
    .slider:before {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.2s;
    }
    input:checked + .slider { background: #4a90d9; }
    input:checked + .slider:before { transform: translateX(16px); }
    .shortcut-input { cursor: pointer; font-family: monospace; }
    .shortcut-input.recording { border-color: #4a90d9; color: #4a90d9; }
    .actions {
      margin-top: 24px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      align-items: center;
    }
    .status { font-size: 11px; color: #4a90d9; flex: 1; }
    .btn {
      padding: 8px 18px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-primary { background: #4a90d9; color: white; }
    .btn-primary:hover { background: #357abd; }
    .btn-secondary { background: #333; color: #ccc; }
    .btn-secondary:hover { background: #444; }
  </style>
</head>
<body>
  <h1>Pop Translate — Settings</h1>

  <div class="field">
    <label>OpenAI API Key</label>
    <input type="password" id="apiKey" placeholder="sk-...">
  </div>

  <div class="field">
    <label>Model</label>
    <select id="model">
      <option value="gpt-4o-mini">GPT-4o Mini (fast, cheap)</option>
      <option value="gpt-4o">GPT-4o (best quality)</option>
      <option value="gpt-4-turbo">GPT-4 Turbo</option>
    </select>
  </div>

  <div class="field">
    <label>Source Language</label>
    <select id="sourceLang">
      <option value="auto">Auto-detect</option>
      <option value="en">English</option>
      <option value="vi">Vietnamese</option>
      <option value="zh">Chinese</option>
      <option value="ja">Japanese</option>
      <option value="ko">Korean</option>
      <option value="fr">French</option>
      <option value="es">Spanish</option>
      <option value="de">German</option>
    </select>
  </div>

  <div class="field">
    <label>Target Language</label>
    <select id="targetLang">
      <option value="vi">Vietnamese</option>
      <option value="en">English</option>
      <option value="zh">Chinese</option>
      <option value="ja">Japanese</option>
      <option value="ko">Korean</option>
      <option value="fr">French</option>
      <option value="es">Spanish</option>
      <option value="de">German</option>
    </select>
  </div>

  <div class="field">
    <label>Translation Tone</label>
    <select id="tone">
      <option value="casual">Casual</option>
      <option value="formal">Formal</option>
      <option value="literal">Literal</option>
    </select>
  </div>

  <div class="field">
    <label>Translate Hotkey (click field, then press your shortcut)</label>
    <input type="text" id="hotkey" class="shortcut-input" readonly placeholder="Click to record...">
  </div>

  <div class="field">
    <label>Grammar Fix Hotkey (click field, then press your shortcut)</label>
    <input type="text" id="rephraseHotkey" class="shortcut-input" readonly placeholder="Click to record...">
  </div>

  <div class="field">
    <div class="toggle-row">
      <span class="toggle-label">Launch at startup</span>
      <label class="toggle">
        <input type="checkbox" id="launchAtStartup">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="actions">
    <span class="status" id="status"></span>
    <button class="btn btn-secondary" id="btn-cancel">Cancel</button>
    <button class="btn btn-primary" id="btn-save">Save</button>
  </div>

  <script src="settings.js"></script>
</body>
</html>
